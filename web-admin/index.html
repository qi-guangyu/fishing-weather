<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>钓鱼天气 · 管理后台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 登录页（未登录时显示） -->
  <div id="login-view"></div>

  <!-- 主框架（已登录时显示） -->
  <div id="app-view" class="hidden">
    <aside id="sidebar">
      <div class="brand">🎣 钓鱼天气<small>管理后台</small></div>
      <nav id="menu"></nav>
      <div class="side-foot">v1.0 · Web Admin</div>
    </aside>
    <div class="main">
      <header id="topbar">
        <div id="page-title">统计看板</div>
        <div class="user-box">
          <span id="user-name"></span>
          <button id="logout-btn" class="btn btn-ghost btn-sm">退出登录</button>
        </div>
      </header>
      <section id="view-container"></section>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <!-- 核心模块（无框架，按序加载） -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/router.js"></script>
  <!-- 视图模块 -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/spots.js"></script>
  <script src="js/views/submissions.js"></script>
  <script src="js/views/content.js"></script>
  <script src="js/views/users.js"></script>
  <script src="js/views/pages.js"></script>
  <!-- 启动 -->
  <script src="js/app.js"></script>
</body>
</html>
