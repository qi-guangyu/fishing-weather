<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>登录 - 钓鱼气象</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a73e8;--primary-hover:#1557b0;--bg:#0a0e1a;
  --card:rgba(255,255,255,0.08);--card-hover:rgba(255,255,255,0.12);
  --text:#f1f5f9;--text-secondary:rgba(241,245,249,0.65);--text-light:rgba(241,245,249,0.4);
  --border:rgba(255,255,255,0.10);--radius:16px;--radius-sm:10px;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.page{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 20px}

/* Header */
.header{padding:48px 0 32px;text-align:center}
.logo{font-size:48px;margin-bottom:12px}
.brand{font-size:26px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.slogan{font-size:13px;color:var(--text-secondary);margin-top:6px}

/* Tab Switch */
.tabs{display:flex;background:var(--card);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px;border:1px solid var(--border)}
.tab-btn{flex:1;text-align:center;padding:10px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;color:var(--text-secondary);border:none;background:none}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,115,232,0.3)}

/* Form */
.form{display:none}
.form.active{display:block}

.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;outline:none;transition:border .2s}
.input-wrap input:focus{border-color:var(--primary);background:rgba(255,255,255,0.05)}
.input-wrap input::placeholder{color:var(--text-light)}
.input-wrap .input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-light);cursor:pointer;user-select:none}
.input-wrap .input-icon:hover{color:var(--text-secondary)}

.error-msg{font-size:12px;color:var(--danger);margin-top:4px;display:none}
.error-msg.show{display:block}

/* Submit Button */
.submit-btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.submit-btn:hover{background:var(--primary-hover)}
.submit-btn:active{transform:scale(0.98)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.submit-btn .spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .spinner{display:block}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.toast.success{background:rgba(16,185,129,0.9);color:#fff}
.toast.error{background:rgba(239,68,68,0.9);color:#fff}
.toast.info{background:rgba(26,115,232,0.9);color:#fff}

/* Footer */
.footer{text-align:center;padding:40px 0 20px;color:var(--text-light);font-size:12px;margin-top:auto}

/* Desktop tweaks */
@media(min-width:768px){
  .page{padding:0 40px}
  .header{padding:64px 0 40px}
  .brand{font-size:30px}
}
</style>
</head>
<body>
<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="logo">🎣</div>
    <div class="brand">钓鱼气象</div>
    <div class="slogan">查天气 · 找钓点 · 钓大鱼</div>
  </div>

  <!-- Tab -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">登录</button>
    <button class="tab-btn" onclick="switchTab('register')">注册</button>
  </div>

  <!-- Login Form -->
  <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
    <div class="input-group">
      <label>用户名</label>
      <div class="input-wrap">
        <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username" required>
        <span class="input-icon">👤</span>
      </div>
      <div class="error-msg" id="loginUserError"></div>
    </div>
    <div class="input-group">
      <label>密码</label>
      <div class="input-wrap">
        <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password" required>
        <span class="input-icon" onclick="togglePass('loginPass',this)" title="显示/隐藏">👁️</span>
      </div>
      <div class="error-msg" id="loginPassError"></div>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn">
      <span class="btn-text">登 录</span>
      <span class="spinner"></span>
    </button>
  </form>

  <!-- Register Form -->
  <form class="form" id="registerForm" onsubmit="handleRegister(event)">
    <div class="input-group">
      <label>用户名</label>
      <div class="input-wrap">
        <input type="text" id="regUser" placeholder="4-20位字母/数字/下划线" autocomplete="off" required>
        <span class="input-icon">👤</span>
      </div>
      <div class="error-msg" id="regUserError"></div>
    </div>
    <div class="input-group">
      <label>密码</label>
      <div class="input-wrap">
        <input type="password" id="regPass" placeholder="至少6位" autocomplete="new-password" required>
        <span class="input-icon" onclick="togglePass('regPass',this)" title="显示/隐藏">👁️</span>
      </div>
      <div class="error-msg" id="regPassError"></div>
    </div>
    <div class="input-group">
      <label>确认密码</label>
      <div class="input-wrap">
        <input type="password" id="regPass2" placeholder="再次输入密码" autocomplete="new-password" required>
        <span class="input-icon" onclick="togglePass('regPass2',this)" title="显示/隐藏">👁️</span>
      </div>
      <div class="error-msg" id="regPass2Error"></div>
    </div>
    <button type="submit" class="submit-btn" id="regBtn">
      <span class="btn-text">注 册</span>
      <span class="spinner"></span>
    </button>
  </form>

  <!-- Footer -->
  <div class="footer">钓鱼气象 © 2026 · 好天气，好渔获</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== API Base Configuration =====
function getApiBase(){
  const saved = localStorage.getItem('apiBase');
  if(saved) return saved;
  const host = window.location.hostname;
  const protocol = window.location.protocol;
  if(protocol === 'file:' || host === 'localhost' || host === '127.0.0.1'){
    return (host === 'localhost' || host === '127.0.0.1') ? window.location.origin + '/api' : 'http://localhost:3456/api';
  }
  // 部署到 GitHub Pages 等静态托管时，默认回退到本地后端（运行后端后测试用）
  // 如需正式托管后端，请在 localStorage 中设置 apiBase，例如：localStorage.setItem('apiBase','https://your-api.com/api')
  return 'http://localhost:3456/api';
}
const API_BASE = getApiBase() + '/auth';

// ===== Tab Switch =====
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(tab==='login'?0:1)===i);
  });
  document.getElementById('loginForm').classList.toggle('active',tab==='login');
  document.getElementById('registerForm').classList.toggle('active',tab==='register');
  clearErrors();
}

// ===== Toggle Password =====
function togglePass(inputId,el){
  const inp=document.getElementById(inputId);
  if(inp.type==='password'){inp.type='text';el.textContent='🙈'}
  else{inp.type='password';el.textContent='👁️'}
}

// ===== Clear Errors =====
function clearErrors(){
  document.querySelectorAll('.error-msg').forEach(e=>e.classList.remove('show'));
}

// ===== Show Error =====
function showError(id,msg){
  const el=document.getElementById(id);
  el.textContent=msg;el.classList.add('show');
}

// ===== Toast =====
let toastTimer;
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== Friendly Fetch Error =====
function friendlyError(err){
  if(err.name==='TypeError' || err.message==='Failed to fetch' || /fetch/i.test(err.message)){
    return '无法连接后端服务，请确认已运行 backend/server.js（端口3456）';
  }
  return err.message;
}

// ===== Set Loading =====
function setLoading(btnId,loading){
  const btn=document.getElementById(btnId);
  if(loading){btn.classList.add('loading');btn.disabled=true}
  else{btn.classList.remove('loading');btn.disabled=false}
}

// ===== Get Redirect URL =====
function getRedirect(){
  const params=new URLSearchParams(window.location.search);
  return params.get('redirect')||'fishing-spots.html';
}

// ===== Store Auth =====
function storeAuth(data){
  localStorage.setItem('token',data.token);
  localStorage.setItem('user',JSON.stringify(data.user));
}

// ===== Handle Login =====
async function handleLogin(e){
  e.preventDefault();clearErrors();
  const username=document.getElementById('loginUser').value.trim();
  const password=document.getElementById('loginPass').value;
  if(!username){showError('loginUserError','请输入用户名');return}
  if(!password){showError('loginPassError','请输入密码');return}

  setLoading('loginBtn',true);
  try{
    const res=await fetch(API_BASE+'/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.message||'登录失败');
    storeAuth(data);
    showToast('登录成功','success');
    setTimeout(()=>{window.location.href=getRedirect()},800);
  }catch(err){
    showToast(friendlyError(err),'error');
    setLoading('loginBtn',false);
  }
}

// ===== Handle Register =====
async function handleRegister(e){
  e.preventDefault();clearErrors();
  const username=document.getElementById('regUser').value.trim();
  const password=document.getElementById('regPass').value;
  const password2=document.getElementById('regPass2').value;

  // Validate
  if(!username){showError('regUserError','请输入用户名');return}
  if(!/^[a-zA-Z0-9_\u4e00-\u9fff]{3,20}$/.test(username)){
    showError('regUserError','用户名需3-20位，支持中英文、数字、下划线');return
  }
  if(!password){showError('regPassError','请输入密码');return}
  if(password.length<6){showError('regPassError','密码至少6位');return}
  if(password!==password2){showError('regPass2Error','两次输入不一致');return}

  setLoading('regBtn',true);
  try{
    const res=await fetch(API_BASE+'/register',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.message||'注册失败');
    storeAuth(data);
    showToast('注册成功，欢迎加入！','success');
    setTimeout(()=>{window.location.href=getRedirect()},800);
  }catch(err){
    showToast(friendlyError(err),'error');
    setLoading('regBtn',false);
  }
}

// ===== Check if already logged in =====
(function(){
  const token=localStorage.getItem('token');
  if(token){
    // Verify token is still valid
    fetch(API_BASE+'/me',{headers:{'Authorization':'Bearer '+token}})
      .then(r=>r.json())
      .then(d=>{
        if(d.user){
          showToast('已登录，正在跳转...','info');
          setTimeout(()=>{window.location.href=getRedirect()},600);
        }else{
          localStorage.removeItem('token');
          localStorage.removeItem('user');
        }
      })
      .catch(()=>{});
  }

  // Check if redirected from register
  const params=new URLSearchParams(window.location.search);
  if(params.get('tab')==='register')switchTab('register');
})();
</script>
</body>
</html>
